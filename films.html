<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>films – bunny garden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f1f6f8;
      --dark:     #21273d;
      --slate:    #6a759b;
      --blue:     #b9d4f1;
      --blue-dim: rgba(185,212,241,0.15);
      --purple:   #8c7dc0;
      --muted:    #7a87a8;
      --border:   #c4d6e8;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--dark);
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 17px;
      line-height: 1.8;
    }
    .page { max-width: 680px; margin: 0 auto; padding: 0 1.75rem; }
    a { color: var(--slate); text-underline-offset: 3px; }
    a:hover { color: var(--dark); }
    header { padding: 2.75rem 0 1.5rem; }
    .site-title {
      font-family: 'VT323', monospace;
      font-size: 3rem;
      color: var(--dark);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .site-title a { text-decoration: none; color: inherit; }
    .dot { color: var(--purple); }
    nav { margin-top: 0.75rem; display: flex; flex-wrap: wrap; column-gap: 1.375rem; }
    nav a { font-size: 0.9375rem; color: var(--muted); text-decoration: none; }
    nav a:hover { color: var(--dark); text-decoration: underline; }
    nav a.active { color: var(--slate); text-decoration: underline; }
    .rule { border: none; border-top: 1px dashed var(--border); margin: 0; }
    .section { padding: 1.875rem 0; }
    .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.125rem; }
    .section-label {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      color: var(--slate);
      letter-spacing: 0.04em;
    }
    .section-label::before { content: '> '; color: var(--purple); }
    .section-more { font-size: 0.875rem; color: var(--muted); text-decoration: none; }
    .section-more:hover { color: var(--slate); }
    footer {
      padding: 1.875rem 0 3.5rem;
      font-size: 0.875rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .footer-links { display: flex; gap: 1rem; }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--dark); }

    /* ── embed overrides ──────────────────────────────────────────── */
    #letterboxd-embed-wrapper-tc {
      font-family: 'Courier Prime', 'Courier New', monospace !important;
      font-size: 17px !important;
      color: var(--dark) !important;
      background: transparent !important;
    }
    #letterboxd-embed-wrapper-tc * {
      font-family: 'Courier Prime', 'Courier New', monospace !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    #letterboxd-embed-wrapper-tc ul,
    #letterboxd-embed-wrapper-tc ol { list-style: none !important; padding: 0 !important; margin: 0 !important; }
    #letterboxd-embed-wrapper-tc li {
      display: flex !important;
      gap: 0.875rem !important;
      padding: 0.875rem 0 !important;
      border-bottom: 1px dotted var(--border) !important;
      border-top: none !important;
      background: transparent !important;
    }
    #letterboxd-embed-wrapper-tc li:last-child { border-bottom: none !important; }
    #letterboxd-embed-wrapper-tc img {
      width: 52px !important;
      height: auto !important;
      display: block !important;
      border: 1px solid var(--border) !important;
      flex-shrink: 0 !important;
    }
    #letterboxd-embed-wrapper-tc a {
      color: var(--dark) !important;
      text-decoration: none !important;
      font-weight: 700 !important;
    }
    #letterboxd-embed-wrapper-tc a:hover { color: var(--slate) !important; text-decoration: underline !important; }
    #letterboxd-embed-wrapper-tc [class*="star"],
    #letterboxd-embed-wrapper-tc [class*="rating"] {
      color: var(--purple) !important;
      background: transparent !important;
    }
    /* reviews — show as small italic muted text, cap at 3 lines */
    #letterboxd-embed-wrapper-tc p {
      font-size: 0.875rem !important;
      font-style: italic !important;
      color: var(--muted) !important;
      font-weight: 400 !important;
      margin-top: 0.3rem !important;
      line-height: 1.55 !important;
      display: -webkit-box !important;
      -webkit-line-clamp: 3 !important;
      -webkit-box-orient: vertical !important;
      overflow: hidden !important;
    }
    #letterboxd-embed-wrapper-tc time,
    #letterboxd-embed-wrapper-tc [class*="date"],
    #letterboxd-embed-wrapper-tc small {
      font-size: 0.875rem !important;
      color: var(--muted) !important;
      font-weight: 400 !important;
    }
    /* hide any branding the embed appends */
    #letterboxd-embed-wrapper-tc [class*="footer"],
    #letterboxd-embed-wrapper-tc [class*="brand"],
    #letterboxd-embed-wrapper-tc [class*="powered"] { display: none !important; }

    #lb-status { font-size: 1rem; color: var(--muted); padding: 0.25rem 0 0.75rem; }

    @media (max-width: 500px) { .site-title { font-size: 2.25rem; } }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="site-title"><a href="index.html">bunny garden<span class="dot">.</span></a></div>
      <nav>
        <a href="about.html">about</a>
        <a href="now.html">now</a>
        <a href="films.html" class="active">films</a>
        <a href="garden.html">garden</a>
        <a href="guestbook.html">guestbook</a>
        <a href="archive.html">all posts</a>
        <a href="feed.xml">rss</a>
      </nav>
    </header>

    <hr class="rule">

    <div class="section">
      <div class="section-head">
        <span class="section-label">diary</span>
        <a class="section-more" href="https://letterboxd.com/manipulative/films/diary/" target="_blank" rel="noopener">letterboxd &rarr;</a>
      </div>
      <p id="lb-status">loading...</p>
      <div id="letterboxd-embed-wrapper-tc"></div>
    </div>

    <hr class="rule">

    <footer>
      <div class="footer-links">
        <a href="mailto:you@email.com">contact</a>
        <a href="guestbook.html">guestbook</a>
        <a href="feed.xml">rss</a>
      </div>
      <span>made with &#9825;</span>
    </footer>

  </div>

  <script>
    var LB_USER  = 'manipulative';
    var statusEl = document.getElementById('lb-status');
    var wrapEl   = document.getElementById('letterboxd-embed-wrapper-tc');

    fetch('https://lb-embed-content.bokonon.dev?username=' + LB_USER)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function(html) {
        if (!html || html.trim().length < 10) throw new Error('empty response');
        statusEl.style.display = 'none';
        wrapEl.innerHTML = html;
        // fix letterboxd CDN hotlink protection
        wrapEl.querySelectorAll('img').forEach(function(img) {
          img.setAttribute('referrerpolicy', 'no-referrer');
          var src = img.src;
          img.src = '';
          img.src = src;
        });
      })
      .catch(function(err) {
        console.warn('[bunny garden] embed error:', err.message);
        statusEl.innerHTML =
          "couldn't load right now \u2014 " +
          "<a href='https://letterboxd.com/" + LB_USER + "/films/diary/' target='_blank' rel='noopener'>view on letterboxd &rarr;</a>";
      });
  </script>
</body>
</html>
