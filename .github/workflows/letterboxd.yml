name: Fetch Letterboxd

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch embed HTML
        run: |
          curl -s -A "Mozilla/5.0" \
            "https://lb-embed-content.bokonon.dev?username=manipulative" \
            -o letterboxd-cache.html
          if [ ! -s letterboxd-cache.html ]; then
            echo "Empty response — keeping existing cache"
            exit 0
          fi
          echo "Fetched $(wc -c < letterboxd-cache.html) bytes"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add letterboxd-cache.html
          git diff --staged --quiet || git commit -m "chore: update letterboxd cache"
          git push
